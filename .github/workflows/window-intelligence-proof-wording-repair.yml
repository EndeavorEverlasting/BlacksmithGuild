name: Window Intelligence Proof Wording Repair

on:
  push:
    branches:
      - feat/window-metadata-intelligence
    paths:
      - '.github/workflows/window-intelligence-proof-wording-repair.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/window-metadata-intelligence
          fetch-depth: 0

      - name: Align exact proof wording
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/tbg/Invoke-TbgWindowIntelligence.ps1')
          text = path.read_text(encoding='utf-8-sig')
          old = 'This report proves metadata collection, identity resolution, and any recorded action dispatch only. It does not prove game acceptance, campaign readiness, command acknowledgement, movement, arrival, trading, or live product completion.'
          new = 'This report proves metadata collection, identity resolution, and any recorded action dispatch only. It does not prove that the game accepted an action, campaign readiness, command acknowledgement, movement, arrival, trading, or live product completion.'
          if old in text:
              text = text.replace(old, new)
              path.write_text(text, encoding='utf-8-sig', newline='')
          elif new not in text:
              raise SystemExit('Expected proof-boundary sentence was not found.')

      - name: Commit exact repair when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'The exact proof wording is already present.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/tbg/Invoke-TbgWindowIntelligence.ps1
          git commit -m 'fix(window-intel): state action acceptance proof boundary explicitly'
          git push origin HEAD:feat/window-metadata-intelligence
