name: PR Lifecycle Automation

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - converted_to_draft
      - ready_for_review
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  issue_comment:
    types:
      - created
  workflow_run:
    workflows:
      - Governor Contracts
      - Harness Policy Reports
      - Hostile Escape Contracts
    types:
      - completed
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to inspect, promote, and merge when eligible
        required: false
        type: number

permissions:
  contents: write
  actions: read
  checks: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-lifecycle-${{ github.event.pull_request.number || github.event.issue.number || github.event.workflow_run.head_sha || inputs.pr_number || github.event_name }}
  cancel-in-progress: true

jobs:
  inspect-promote-and-merge:
    name: Inspect evidence, promote, and exact-head merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default-branch controller
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Ensure lifecycle control labels
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $labels = @(
            @{ Name = 'pr-lifecycle:hold-draft'; Color = 'D93F0B'; Description = 'Keep this pull request in draft despite passing readiness checks.' },
            @{ Name = 'pr-lifecycle:hold-merge'; Color = 'B60205'; Description = 'Block automatic merge while preserving normal validation and reporting.' },
            @{ Name = 'pr-lifecycle:auto-merge-legacy'; Color = '0E8A16'; Description = 'Allow deterministic automatic merge for a pre-policy pull request.' },
            @{ Name = 'pr-lifecycle:auto-merge-stacked'; Color = '0366D6'; Description = 'Allow deterministic automatic merge into a non-default base branch.' },
            @{ Name = 'pr-lifecycle:auto-merge-fork'; Color = '5319E7'; Description = 'Allow deterministic automatic merge for a deliberately trusted fork pull request.' }
          )

          foreach ($label in $labels) {
            gh label create $label.Name `
              --repo $env:REPOSITORY `
              --color $label.Color `
              --description $label.Description `
              --force
            if ($LASTEXITCODE -ne 0) {
              throw "Could not ensure lifecycle label $($label.Name)."
            }
          }

      - name: Resolve lifecycle mode and pull request
        id: resolve
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          $event = Get-Content -LiteralPath $env:GITHUB_EVENT_PATH -Raw | ConvertFrom-Json
          $number = ''
          $mode = ''

          if ($env:EVENT_NAME -in @('pull_request_target', 'pull_request_review')) {
            $number = [string]$event.pull_request.number
          } elseif ($env:EVENT_NAME -eq 'issue_comment') {
            $isPullRequest = $null -ne $event.issue.pull_request
            $command = ([string]$event.comment.body).Trim()
            if ($isPullRequest -and $command -eq '/reconcile-pr-lifecycle') {
              $number = [string]$event.issue.number
            }
          } elseif ($env:EVENT_NAME -eq 'workflow_run') {
            $pullRequests = @($event.workflow_run.pull_requests)
            if ($pullRequests.Count -gt 0) {
              $number = [string]$pullRequests[0].number
            } else {
              $headSha = [string]$event.workflow_run.head_sha
              $previousErrorActionPreference = $ErrorActionPreference
              try {
                $ErrorActionPreference = 'Continue'
                $global:LASTEXITCODE = 0
                $number = (& gh api "repos/$env:REPOSITORY/commits/$headSha/pulls" --jq '.[0].number // empty' 2>$null | Out-String).Trim()
                $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { [int]$LASTEXITCODE }
              } finally {
                $ErrorActionPreference = $previousErrorActionPreference
              }
              if ($exitCode -ne 0) { throw "Could not resolve a pull request for workflow head $headSha." }
              if ([string]::IsNullOrWhiteSpace($number)) { $mode = 'sweep' }
            }
          } elseif ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $number = [string]$env:DISPATCH_PR_NUMBER
            if ([string]::IsNullOrWhiteSpace($number)) { $mode = 'sweep' }
          } elseif ($env:EVENT_NAME -eq 'schedule') {
            $mode = 'sweep'
          }

          if (-not [string]::IsNullOrWhiteSpace($number)) { $mode = 'single' }
          "pr_number=$number" >> $env:GITHUB_OUTPUT
          "mode=$mode" >> $env:GITHUB_OUTPUT

          if ($mode -eq 'single') {
            Write-Host "Resolved pull request #$number."
          } elseif ($mode -eq 'sweep') {
            Write-Host 'No single PR event was resolved; all open pull requests will be reconciled.'
          } else {
            Write-Host 'The event did not request lifecycle reconciliation; this run is a safe no-op.'
          }

      - name: Inspect one pull request
        if: steps.resolve.outputs.mode == 'single'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $outputRoot = Join-Path $env:RUNNER_TEMP 'pr-lifecycle'
          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
          $outputPath = Join-Path $outputRoot ('pr-{0}.json' -f '${{ steps.resolve.outputs.pr_number }}')
          ./scripts/tbg/Invoke-TbgPrLifecycle.ps1 `
            -PrNumber ([int]'${{ steps.resolve.outputs.pr_number }}') `
            -Repository '${{ github.repository }}' `
            -OutputPath $outputPath

      - name: Reconcile all open pull requests
        if: steps.resolve.outputs.mode == 'sweep'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $outputRoot = Join-Path $env:RUNNER_TEMP 'pr-lifecycle'
          ./scripts/tbg/Invoke-TbgPrLifecycleSweep.ps1 `
            -Repository '${{ github.repository }}' `
            -OutputDirectory $outputRoot

      - name: Upload lifecycle results
        if: always() && steps.resolve.outputs.mode != ''
        uses: actions/upload-artifact@v4
        with:
          name: pr-lifecycle-${{ steps.resolve.outputs.pr_number || 'sweep' }}-${{ github.run_id }}
          path: ${{ runner.temp }}/pr-lifecycle/*.json
          if-no-files-found: warn
          retention-days: 14
