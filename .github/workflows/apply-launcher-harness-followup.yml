name: Apply Launcher Harness Follow-up

on:
  pull_request:
    branches:
      - agent/route-automation-operator-plan

permissions:
  contents: write

jobs:
  apply-bounded-repair:
    if: >-
      github.event.pull_request.number == 52 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout owned branch
        uses: actions/checkout@v4
        with:
          ref: fix/launcher-supervisor-empty-list
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply exact bounded replacements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: bytes, new: bytes) -> None:
              target = Path(path)
              data = target.read_bytes()
              count = data.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one replacement target, found {count}')
              target.write_bytes(data.replace(old, new, 1))

          replace_exact(
              'scripts/run-launcher-validation-workhorse.ps1',
              b"contractProof = ($steps | Where-Object { $_.name -like 'verify-*' -and $_.status -eq 'passed' }).Count -gt 0",
              b"contractProof = @($steps | Where-Object { $_.name -like 'verify-*' -and $_.status -eq 'passed' }).Count -gt 0",
          )
          replace_exact(
              'scripts/run-launcher-validation-workhorse.ps1',
              b"staticTestProof = ($steps | Where-Object { $_.name -like 'verify-*' -and $_.status -eq 'failed' }).Count -eq 0",
              b"staticTestProof = @($steps | Where-Object { $_.name -like 'verify-*' -and $_.status -eq 'failed' }).Count -eq 0",
          )

          old = b"""    $global:LASTEXITCODE = 0
              $output = & git -C $WorkingRoot @Arguments 2>&1
              $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { [int]$LASTEXITCODE }
          """.replace(b'              ', b'    ')
          new = b"""    $previousErrorActionPreference = $ErrorActionPreference
              try {
                  $ErrorActionPreference = 'Continue'
                  $global:LASTEXITCODE = 0
                  $output = & git -C $WorkingRoot @Arguments 2>&1
                  $exitCode = if ($null -eq $LASTEXITCODE) { 0 } else { [int]$LASTEXITCODE }
              } finally {
                  $ErrorActionPreference = $previousErrorActionPreference
              }
          """.replace(b'              ', b'    ')
          replace_exact('scripts/run-launcher-validation-supervisor.ps1', old, new)
          PY

      - name: Show and validate diff
        shell: bash
        run: |
          git diff --check
          git status --short
          git diff --stat
          git diff -- scripts/run-launcher-validation-workhorse.ps1 scripts/run-launcher-validation-supervisor.ps1

      - name: Commit and push repair
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/run-launcher-validation-workhorse.ps1 scripts/run-launcher-validation-supervisor.ps1
          git commit -m 'fix(harness): stabilize result counts and native git stderr'
          git push origin HEAD:fix/launcher-supervisor-empty-list
