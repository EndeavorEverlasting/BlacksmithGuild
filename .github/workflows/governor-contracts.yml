name: Governor Contracts

on:
  pull_request:
  push:
    branches:
      - main
      - feat/campaign-runtime-governor
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    name: Governor contract verifiers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scope note
        shell: pwsh
        run: |
          Write-Host 'This workflow runs text and contract verifiers only.'
          Write-Host 'Bannerlord compile remains a separate Windows developer box validation gate.'

      - name: Parse immediate guild-loop controller
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path './scripts/run-autonomous-guild-loop-immediate.ps1').Path,
            [ref]$tokens,
            [ref]$errors)
          if ($errors.Count -gt 0) { throw ($errors.Message -join '; ') }
          Write-Host 'Immediate guild-loop controller parse: PASS'

      - name: Parse timed guild-loop controller
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path './scripts/run-autonomous-guild-loop-operator.ps1').Path,
            [ref]$tokens,
            [ref]$errors)
          if ($errors.Count -gt 0) { throw ($errors.Message -join '; ') }
          Write-Host 'Timed guild-loop controller parse: PASS'

      - name: Parse launcher modal, recovery, fast-frontdoor, supervisor, workhorse, and diagnostics controllers
        shell: pwsh
        run: |
          foreach ($path in @(
            './scripts/launcher-modal-aware-context-nav.ps1',
            './scripts/launcher-recovery-policy.ps1',
            './scripts/launcher-fast-frontdoor.ps1',
            './scripts/run-launcher-validation-supervisor.ps1',
            './scripts/run-launcher-validation-workhorse.ps1',
            './scripts/invoke-collect-diagnostics.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path).Path,
              [ref]$tokens,
              [ref]$errors)
            if ($errors.Count -gt 0) {
              throw (('{0}: {1}' -f $path, ($errors.Message -join '; ')))
            }
          }
          Write-Host 'Launcher modal/recovery/fast-frontdoor/supervisor/workhorse/diagnostics controller parse: PASS'

      - name: Verify autonomous guild-loop context controller
        shell: pwsh
        run: ./scripts/verify-autonomous-guild-loop-context-contract.ps1

      - name: Verify campaign governor contract
        shell: pwsh
        run: ./scripts/verify-campaign-governor-contract.ps1

      - name: Verify campaign activity dispatcher contract
        shell: pwsh
        run: ./scripts/verify-campaign-activity-dispatcher-contract.ps1

      - name: Verify campaign activity handoff contract
        shell: pwsh
        run: ./scripts/verify-campaign-activity-handoff-contract.ps1

      - name: Verify tick cost profiler contract
        shell: pwsh
        run: ./scripts/verify-tick-cost-profiler-contract.ps1

      - name: Verify worker cadence and market refresh contract
        shell: pwsh
        run: ./scripts/verify-worker-cadence-contract.ps1

      - name: Verify Bannerlord save-layout contract
        shell: pwsh
        run: ./scripts/verify-bannerlord-save-layout-contract.ps1

      - name: Verify launcher dependency caution and bounded recovery doctrine
        shell: pwsh
        run: ./scripts/verify-launcher-dependency-caution-doctrine.ps1

      - name: Verify fast launcher frontdoor
        shell: pwsh
        run: ./scripts/verify-fast-launcher-frontdoor.ps1

      - name: Verify launcher validation workhorse
        shell: pwsh
        run: ./scripts/verify-launcher-validation-workhorse.ps1

      - name: Verify multimodal launcher validation supervisor
        shell: pwsh
        run: ./scripts/verify-launcher-validation-supervisor.ps1

      - name: Verify clickable command surface
        shell: pwsh
        run: ./scripts/verify-clickable-command-surface.ps1

      - name: Verify command-bus patch contract
        shell: pwsh
        run: ./scripts/verify-campaign-governor-commandbus-patch-contract.ps1

      - name: Verify route branch autostart contract
        shell: pwsh
        run: ./scripts/verify-route-branch-autostart-contract.ps1

      - name: Verify agent-run MapTrade branch proof contract
        shell: pwsh
        run: ./scripts/verify-maptrade-branch-autostart-proof-contract.ps1

      - name: Verify route-owned clock contract
        shell: pwsh
        run: ./scripts/verify-route-owned-clock-resume-contract.ps1

      - name: Verify route-owned clock collector contract
        shell: pwsh
        run: ./scripts/verify-route-owned-clock-live-proof-collector-contract.ps1

      - name: Verify operator control surface
        shell: pwsh
        run: ./scripts/verify-operator-control-surface.ps1

      - name: Document source wiring gate
        shell: pwsh
        run: |
          Write-Host 'Command-bus source verifier intentionally requires the local patch output.'
          Write-Host 'Run scripts/validate-campaign-governor-local.ps1 -ApplyCommandBusPatch on Windows developer box before marking PR ready.'

  windows-powershell-supervisor-regression:
    name: Windows PowerShell 5.1 supervisor regression
    runs-on: windows-latest
    steps:
      - name: Checkout exact pull-request commit
        shell: powershell
        run: |
          git init -q .
          git remote add origin "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY.git"
          git fetch -q --depth 1 origin $env:GITHUB_SHA
          git checkout -q --detach FETCH_HEAD

      - name: Exercise synchronized first-candidate selection
        shell: powershell
        run: .\scripts\test-launcher-validation-supervisor-workspace-selection.ps1
