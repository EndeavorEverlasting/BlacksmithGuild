name: P20 Main Reconciliation

on:
  push:
    branches:
      - feat/window-lifecycle-agent-routing
    paths:
      - .github/workflows/p20-main-merge.yml

permissions:
  contents: write

jobs:
  merge-and-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/window-lifecycle-agent-routing
          fetch-depth: 0

      - name: Merge current main without rewriting P20
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          if ($LASTEXITCODE -ne 0) {
            $conflicts = @(git diff --name-only --diff-filter=U)
            $unexpected = @($conflicts | Where-Object { $_ -ne 'AGENTS.md' })
            if ($unexpected.Count -gt 0) {
              throw "Unexpected merge conflicts: $($unexpected -join ', ')"
            }
            if ($conflicts -contains 'AGENTS.md') {
              git checkout --ours -- AGENTS.md
              git add AGENTS.md
            }
          }
          $remaining = @(git diff --name-only --diff-filter=U)
          if ($remaining.Count -gt 0) {
            throw "Unresolved merge conflicts remain: $($remaining -join ', ')"
          }
          git rm .github/workflows/p20-main-merge.yml

      - name: Validate reconciled exact tree
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgArtifactEngine.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgSkillRouting.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgProviderCatalog.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgWindowLifecycle.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgWindowLifecycleRuntime.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgEndToEndHarness.ps1
          powershell -File scripts/test-powershell-utf8-bom-contract.ps1
          git diff --check
          git status --short
          git diff --stat --cached

      - name: Commit merge and push
        shell: pwsh
        run: |
          git commit -m "merge: reconcile P20 with current main"
          git push origin HEAD:feat/window-lifecycle-agent-routing
