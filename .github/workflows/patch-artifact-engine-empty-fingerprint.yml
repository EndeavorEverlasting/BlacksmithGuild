name: Patch Empty Artifact Fingerprint

on:
  push:
    branches:
      - test/local-artifact-engine-windows-watcher
    paths:
      - '.github/workflows/patch-artifact-engine-empty-fingerprint.yml'

permissions:
  contents: write

jobs:
  patch:
    name: Apply one-line Windows PowerShell compatibility patch
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: test/local-artifact-engine-windows-watcher
          fetch-depth: 0

      - name: Allow an empty file-set fingerprint and remove this patch workflow
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host 'Applying the bounded empty-file-set fingerprint correction.'
          $path = 'scripts/tbg/Invoke-TbgArtifactEngine.ps1'
          $workflowPath = '.github/workflows/patch-artifact-engine-empty-fingerprint.yml'
          $text = [System.IO.File]::ReadAllText((Resolve-Path $path))
          $before = 'param([Parameter(Mandatory = $true)][string]$Text)'
          $after = 'param([Parameter(Mandatory = $true)][AllowEmptyString()][string]$Text)'
          if (-not $text.Contains($before)) {
            throw "The bounded patch target was not found in $path."
          }
          $updated = $text.Replace($before, $after)
          if (($updated.Split($after).Count - 1) -ne 1) {
            throw 'The bounded patch did not produce exactly one empty-string annotation.'
          }
          [System.IO.File]::WriteAllText((Resolve-Path $path), $updated, (New-Object System.Text.UTF8Encoding($true)))
          Remove-Item -LiteralPath $workflowPath -Force

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- $path $workflowPath
          git diff --cached --check
          git commit -m 'fix(harness): allow empty artifact fingerprints'
          git push origin HEAD:test/local-artifact-engine-windows-watcher
