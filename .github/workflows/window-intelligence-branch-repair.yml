name: Window Intelligence Branch Repair

on:
  push:
    branches:
      - feat/window-metadata-intelligence
    paths:
      - '.github/workflows/window-intelligence-branch-repair.yml'
      - 'scripts/tbg/Invoke-TbgWindowIntelligence.ps1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: windows-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/window-metadata-intelligence
          fetch-depth: 0

      - name: Repair Windows PowerShell-safe renderer and UIA constructor
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/tbg/Invoke-TbgWindowIntelligence.ps1')
          text = path.read_text(encoding='utf-8-sig')
          replacements = {
              '$condition = New-Object System.Windows.Automation.PropertyCondition([System.Windows.Automation.AutomationElement]::NameProperty, [string]$name)': '''$condition = New-Object -TypeName System.Windows.Automation.PropertyCondition -ArgumentList @(
                      [System.Windows.Automation.AutomationElement]::NameProperty,
                      [string]$name
                  )''',
              '$markdown.Add("- Process: `$($item.observation.process.processName)` PID $($item.observation.process.pid)")': "$markdown.Add(('- Process: `{0}` PID {1}' -f [string]$item.observation.process.processName, [int]$item.observation.process.pid))",
              '$markdown.Add("- HWND: `$($item.observation.window.hwnd)`")': "$markdown.Add(('- HWND: `{0}`' -f [Int64]$item.observation.window.hwnd))",
              '$markdown.Add("- Title: `$($item.observation.window.title)`")': "$markdown.Add(('- Title: `{0}`' -f [string]$item.observation.window.title))",
              '$markdown.Add("- Class: `$($item.observation.window.className)`")': "$markdown.Add(('- Class: `{0}`' -f [string]$item.observation.window.className))",
              '$markdown.Add("- Recognition: `$($item.resolution.basis)` at score $($item.resolution.score)")': "$markdown.Add(('- Recognition: `{0}` at score {1}' -f [string]$item.resolution.basis, [int]$item.resolution.score))",
              '$markdown.Add("- Fingerprint: `$($item.resolution.fingerprint.hash)`")': "$markdown.Add(('- Fingerprint: `{0}`' -f [string]$item.resolution.fingerprint.hash))",
              '$markdown.Add("- Action decision: `$($item.actionDecision.reason)`")': "$markdown.Add(('- Action decision: `{0}`' -f [string]$item.actionDecision.reason))",
              '$markdown.Add("- Action result: `$($item.actionResult.reason)`")': "$markdown.Add(('- Action result: `{0}`' -f [string]$item.actionResult.reason))",
              '$handoff.Add("The latest terminal state is `$terminalState`.")': "$handoff.Add(('The latest terminal state is `{0}`.' -f $terminalState))",
          }

          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
                  changed = True
              elif new not in text:
                  raise SystemExit(f'Expected repair target was not found: {old}')

          if changed:
              path.write_text(text, encoding='utf-8-sig', newline='')

      - name: Commit exact repair when needed
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (git status --short)) {
            Write-Host 'The exact repair is already present.'
            exit 0
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/tbg/Invoke-TbgWindowIntelligence.ps1
          git commit -m 'fix(window-intel): make renderer and UIA constructor Windows-safe'
          git push origin HEAD:feat/window-metadata-intelligence
