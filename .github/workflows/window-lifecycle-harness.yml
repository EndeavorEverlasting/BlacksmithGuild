name: Window Lifecycle Harness

on:
  pull_request:
    paths:
      - '.tbg/harness/fixtures/window-intelligence/window-lifecycle-sequences.fixture.json'
      - '.tbg/harness/manifest.json'
      - '.tbg/harness/policies/window-intelligence.policy.json'
      - '.tbg/harness/schemas/window-lifecycle-*.schema.json'
      - '.tbg/harness/window-identities.registry.json'
      - '.tbg/workflows/window-metadata-intelligence.contract.json'
      - 'docs/architecture/window-lifecycle-harness-spine.md'
      - 'scripts/tbg/Resolve-TbgWindowLifecycle.ps1'
      - 'scripts/tbg/Test-TbgWindowLifecycle.ps1'
      - '.github/workflows/window-lifecycle-harness.yml'
  push:
    branches:
      - main
    paths:
      - '.tbg/harness/fixtures/window-intelligence/window-lifecycle-sequences.fixture.json'
      - '.tbg/harness/manifest.json'
      - '.tbg/harness/policies/window-intelligence.policy.json'
      - '.tbg/harness/schemas/window-lifecycle-*.schema.json'
      - '.tbg/harness/window-identities.registry.json'
      - '.tbg/workflows/window-metadata-intelligence.contract.json'
      - 'docs/architecture/window-lifecycle-harness-spine.md'
      - 'scripts/tbg/Resolve-TbgWindowLifecycle.ps1'
      - 'scripts/tbg/Test-TbgWindowLifecycle.ps1'
      - '.github/workflows/window-lifecycle-harness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-core:
    name: PowerShell Core lifecycle reducer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4

      - name: Run lifecycle validator
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/tbg/Test-TbgWindowLifecycle.ps1

  windows-powershell:
    name: Windows PowerShell lifecycle reducer
    runs-on: windows-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4

      - name: Run lifecycle validator
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          .\scripts\tbg\Test-TbgWindowLifecycle.ps1
