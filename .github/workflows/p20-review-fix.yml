name: P20 Review Fix

on:
  push:
    branches:
      - feat/window-lifecycle-agent-routing
    paths:
      - .github/workflows/p20-review-fix.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/window-lifecycle-agent-routing
          fetch-depth: 0

      - name: Patch lifecycle boundary and regression tests
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          engine_path = Path('scripts/tbg/Invoke-TbgArtifactEngine.ps1')
          engine = engine_path.read_text(encoding='utf-8-sig')

          old_header = """    $files = @(Get-TbgCandidates -RepoRoot $RepoRoot -Engine $Engine)
              $jsonFiles = @($files | Where-Object { $_.Extension -eq '.json' })
              $reportFiles = @($files | Where-Object { $_.Extension -eq '.md' })
              if ($files.Count -eq 0) {
          """.replace('              ', '')
          new_header = """    $files = @(Get-TbgCandidates -RepoRoot $RepoRoot -Engine $Engine)
              $jsonFiles = @($files | Where-Object { $_.Extension -eq '.json' })
              $reportFiles = @($files | Where-Object { $_.Extension -eq '.md' })
              if ($files.Count -eq 0) {
          """.replace('              ', '')
          if old_header not in engine:
              raise SystemExit('window lifecycle boundary header not found')

          required_block = """
              $requiredStateFiles = @($files | Where-Object { $_.Name -eq 'window-lifecycle.state.json' })
              $requiredResultFiles = @($files | Where-Object { $_.Name -eq 'window-lifecycle.result.json' })
              $missingRequiredArtifacts = New-Object System.Collections.Generic.List[string]
              if ($requiredStateFiles.Count -eq 0) { $missingRequiredArtifacts.Add('window-lifecycle.state.json') | Out-Null }
              if ($requiredResultFiles.Count -eq 0) { $missingRequiredArtifacts.Add('window-lifecycle.result.json') | Out-Null }
              if ($missingRequiredArtifacts.Count -gt 0) {
                  $availableArtifacts = @($files | ForEach-Object { $_.Name })
                  return New-TbgPacket -EngineId $Engine.id -Schema 'TbgWindowLifecycleBoundary.v1' -TerminalState 'BLOCKED_window_lifecycle_required_artifacts_missing' -NextCommand '.\\ForgeWindowLifecycle.cmd replay' -Payload ([pscustomobject][ordered]@{
                      artifactFound = $true
                      artifactCount = $files.Count
                      availableArtifacts = $availableArtifacts
                      missingRequiredArtifacts = @($missingRequiredArtifacts.ToArray())
                      parserProofLevel = 'artifact_inspection'
                      freshnessVerified = $false
                      independentlyValidated = $false
                      actionAuthority = 'none'
                  }) -Sentences @(
                      'The window-lifecycle-boundary engine found a partial lifecycle artifact set without every authoritative state and result artifact.',
                      "The missing required lifecycle artifact(s) are: $(@($missingRequiredArtifacts.ToArray()) -join ', ').",
                      "The operator should run '.\\ForgeWindowLifecycle.cmd replay' before treating lifecycle routing as fresh."
                  ) -Blocking $true
              }
          """.replace('              ', '    ')
          insertion_point = """    $claims = New-Object System.Collections.Generic.List[object]
          """
          if insertion_point not in engine:
              raise SystemExit('window lifecycle claims insertion point not found')
          engine = engine.replace(insertion_point, required_block + "\n" + insertion_point, 1)

          old_report = """    foreach ($file in $reportFiles) {
                  $claims.Add([pscustomobject][ordered]@{
                      path = Get-TbgRelativePath -RepoRoot $RepoRoot -Path $file.FullName
                      schema = 'markdown-report'
                      status = ''
                      proofLevel = ''
                      proofCeiling = ''
                      candidateClassification = 'report_present'
                      freshnessVerified = (($now - $file.LastWriteTimeUtc).TotalHours -le $maxAgeHours)
                      independentlyValidated = $false
                  }) | Out-Null
              }
          """.replace('              ', '')
          new_report = """    foreach ($file in $reportFiles) {
                  $reportFresh = (($now - $file.LastWriteTimeUtc).TotalHours -le $maxAgeHours)
                  if (-not $reportFresh) { $freshnessVerified = $false }
                  $claims.Add([pscustomobject][ordered]@{
                      path = Get-TbgRelativePath -RepoRoot $RepoRoot -Path $file.FullName
                      schema = 'markdown-report'
                      status = ''
                      proofLevel = ''
                      proofCeiling = ''
                      candidateClassification = 'report_present'
                      freshnessVerified = $reportFresh
                      independentlyValidated = $false
                  }) | Out-Null
              }
          """.replace('              ', '')
          if old_report not in engine:
              raise SystemExit('window lifecycle report freshness block not found')
          engine = engine.replace(old_report, new_report, 1)
          engine_path.write_text(engine, encoding='utf-8-sig', newline='\n')

          test_path = Path('scripts/tbg/Test-TbgArtifactEngine.ps1')
          test = test_path.read_text(encoding='utf-8-sig')
          marker = """    '{ malformed fixture' | Set-Content -LiteralPath $repoHygienePath -Encoding UTF8
          """
          if marker not in test:
              raise SystemExit('artifact engine regression insertion point not found')

          regression = r"""
              $missingStatePath = "$lifecycleStatePath.missing"
              $missingResultPath = "$lifecycleResultPath.missing"
              Move-Item -LiteralPath $lifecycleStatePath -Destination $missingStatePath
              Move-Item -LiteralPath $lifecycleResultPath -Destination $missingResultPath
              try {
                  Remove-Item -LiteralPath $outputRoot -Recurse -Force
                  New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
                  $partialLifecycle = Invoke-TbgChild -ScriptPath $scriptPath -Arguments (@('run', '-Mode', 'auto') + $common)
                  Assert-Tbg -Condition ($partialLifecycle.exitCode -eq 0) -Message "Partial lifecycle fixture failed unexpectedly: $($partialLifecycle.output)"
                  $partialLifecyclePacket = Get-Content -LiteralPath (Join-Path $outputRoot 'window-lifecycle-boundary.result.json') -Raw | ConvertFrom-Json
                  Assert-Tbg -Condition ($partialLifecyclePacket.terminalState -eq 'BLOCKED_window_lifecycle_required_artifacts_missing') -Message 'A report-only lifecycle artifact set did not fail closed.'
                  Assert-Tbg -Condition ($partialLifecyclePacket.payload.actionAuthority -eq 'none') -Message 'A partial lifecycle artifact set must never authorize an action.'
                  Assert-Tbg -Condition (@($partialLifecyclePacket.payload.missingRequiredArtifacts) -contains 'window-lifecycle.state.json') -Message 'The missing lifecycle state artifact was not reported.'
                  Assert-Tbg -Condition (@($partialLifecyclePacket.payload.missingRequiredArtifacts) -contains 'window-lifecycle.result.json') -Message 'The missing lifecycle result artifact was not reported.'
              }
              finally {
                  Move-Item -LiteralPath $missingStatePath -Destination $lifecycleStatePath -Force
                  Move-Item -LiteralPath $missingResultPath -Destination $lifecycleResultPath -Force
              }

              $reportItem = Get-Item -LiteralPath $lifecycleReportPath
              $originalReportWriteUtc = $reportItem.LastWriteTimeUtc
              try {
                  $reportItem.LastWriteTimeUtc = (Get-Date).ToUniversalTime().AddHours(-25)
                  Remove-Item -LiteralPath $outputRoot -Recurse -Force
                  New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
                  $staleReport = Invoke-TbgChild -ScriptPath $scriptPath -Arguments (@('run', '-Mode', 'auto') + $common)
                  Assert-Tbg -Condition ($staleReport.exitCode -eq 0) -Message "Stale lifecycle report fixture failed unexpectedly: $($staleReport.output)"
                  $staleReportPacket = Get-Content -LiteralPath (Join-Path $outputRoot 'window-lifecycle-boundary.result.json') -Raw | ConvertFrom-Json
                  Assert-Tbg -Condition ($staleReportPacket.terminalState -eq 'BLOCKED_window_lifecycle_stale') -Message 'A stale lifecycle report did not make aggregate freshness fail closed.'
              }
              finally {
                  (Get-Item -LiteralPath $lifecycleReportPath).LastWriteTimeUtc = $originalReportWriteUtc
              }

          """.replace('              ', '    ')
          test = test.replace(marker, regression + marker, 1)
          test_path.write_text(test, encoding='utf-8-sig', newline='\n')
          '@ | Set-Content -LiteralPath patch_p20.py -Encoding UTF8
          python patch_p20.py
          Remove-Item patch_p20.py -Force

      - name: Validate bounded fix
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgArtifactEngine.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgSkillRouting.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tbg/Test-TbgProviderCatalog.ps1
          powershell -File scripts/test-powershell-utf8-bom-contract.ps1
          git diff --check
          git status --short
          git diff --stat

      - name: Commit review fix and remove temporary workflow
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/p20-review-fix.yml
          git add scripts/tbg/Invoke-TbgArtifactEngine.ps1 scripts/tbg/Test-TbgArtifactEngine.ps1
          git commit -m "fix(harness): require authoritative lifecycle artifacts"
          git push origin HEAD:feat/window-lifecycle-agent-routing
