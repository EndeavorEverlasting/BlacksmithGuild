name: Repo Hygiene Report

on:
  pull_request:
    paths:
      - 'ForgeRepoHygiene.cmd'
      - 'scripts/tbg/Get-TbgRepoHygieneReport.ps1'
      - 'scripts/tbg/Test-TbgRepoHygieneReport.ps1'
      - '.github/workflows/repo-hygiene-report.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    name: PowerShell integration test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run isolated repo hygiene integration test
        id: integration
        continue-on-error: true
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'repo-hygiene-integration.log'
          try {
            ./scripts/tbg/Test-TbgRepoHygieneReport.ps1 *>&1 |
              Tee-Object -FilePath $logPath
          }
          catch {
            $_ | Format-List * -Force | Out-String |
              Tee-Object -FilePath $logPath -Append
            exit 1
          }

      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene-integration-log
          path: ${{ runner.temp }}/repo-hygiene-integration.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce integration result
        if: steps.integration.outcome != 'success'
        shell: pwsh
        run: |
          Get-Content -LiteralPath "$env:RUNNER_TEMP/repo-hygiene-integration.log" -Raw
          throw 'Repository hygiene integration test failed.'

      - name: Run report against checkout
        shell: pwsh
        run: |
          ./scripts/tbg/Get-TbgRepoHygieneReport.ps1 `
            -RepoRoot . `
            -OutPath "$env:RUNNER_TEMP/repo-hygiene-report.md" `
            -JsonOutPath "$env:RUNNER_TEMP/repo-hygiene-report.json" `
            -NoGitHub

          $report = Get-Content -LiteralPath "$env:RUNNER_TEMP/repo-hygiene-report.json" -Raw | ConvertFrom-Json
          if ($report.schema -ne 'TbgRepoHygieneReport.v1') {
            throw "Unexpected report schema: $($report.schema)"
          }
          if ($report.verdict -ne 'CLEAN') {
            throw "Checkout report should be CLEAN but was $($report.verdict): $($report.blockedReason)"
          }

      - name: Verify patch hygiene
        shell: pwsh
        run: |
          $baseRef = '${{ github.base_ref }}'
          git fetch origin "+refs/heads/$baseRef`:refs/remotes/origin/$baseRef" --depth=1
          git diff --check "origin/$baseRef...HEAD"
