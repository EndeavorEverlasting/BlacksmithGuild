<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Orchestrating coding agent sessions</title>
  <desc id="desc">Exploration agents feed a plan step, implementation writes a report, code-review agents review security, correctness, and simplification, then a PR is opened.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c7d6f2" />
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ff9b72" />
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c084fc" />
    </marker>
    <style>
      text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; fill: #e5e7eb; }
      .title { font-size: 34px; font-weight: 700; fill: #b9c7ff; }
      .subtitle { font-size: 21px; fill: #f3f4f6; }
      .layer { fill: #0f1b20; stroke: #5d7fa8; stroke-width: 3; stroke-dasharray: 11 10; }
      .layer-label { font-size: 21px; font-weight: 700; fill: #d1d5db; }
      .section { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; fill: #d1d5db; }
      .label { font-size: 14px; fill: #c7d6f2; }
      .box-text { font-size: 23px; font-weight: 700; }
      .box-sub { font-size: 16px; fill: #d1d5db; }
      .explore { fill: #5b3308; stroke: #ff9b72; stroke-width: 3; }
      .plan { fill: #064e2f; stroke: #5ee0a1; stroke-width: 3; }
      .implement { fill: #2f6fb6; stroke: #afd2ff; stroke-width: 3; }
      .review { fill: #34274d; stroke: #c084fc; stroke-width: 3; }
      .done { fill: #0b6b46; stroke: #5ee0a1; stroke-width: 3; }
      .orange { stroke: #ff9b72; }
      .blue { stroke: #c7d6f2; }
      .purple { stroke: #c084fc; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="560" fill="#0b0d10" />
  <text x="28" y="44" class="title">Orchestrating coding agent sessions</text>
  <text x="28" y="82" class="subtitle">Orchestrating many focused coding agents together to accomplish a larger task</text>

  <rect x="20" y="130" width="1560" height="390" rx="30" class="layer" />
  <text x="360" y="172" class="layer-label">The AI Layer shapes every session - rules, skills, hooks, sub-agents apply throughout</text>

  <text x="90" y="220" class="section" fill="#ff9b72">Exploration agents</text>
  <text x="1130" y="220" class="section" fill="#c084fc">code-review agents</text>

  <rect x="90" y="240" width="175" height="82" rx="18" class="explore" />
  <text x="135" y="280" class="box-text">Explore</text>
  <text x="145" y="305" class="box-sub">agent 1</text>

  <rect x="90" y="340" width="175" height="82" rx="18" class="explore" />
  <text x="135" y="380" class="box-text">Explore</text>
  <text x="145" y="405" class="box-sub">agent 2</text>

  <rect x="90" y="440" width="175" height="82" rx="18" class="explore" />
  <text x="135" y="480" class="box-text">Explore</text>
  <text x="145" y="505" class="box-sub">agent 3</text>

  <rect x="420" y="335" width="205" height="105" rx="22" class="plan" />
  <text x="494" y="383" class="box-text">Plan</text>
  <text x="457" y="410" class="box-sub">Writes plan.md</text>

  <rect x="780" y="335" width="210" height="105" rx="22" class="implement" />
  <text x="820" y="383" class="box-text">Implement</text>
  <text x="820" y="410" class="box-sub">writes report.md</text>

  <rect x="1140" y="240" width="175" height="82" rx="18" class="review" />
  <text x="1194" y="280" class="box-text">Review</text>
  <text x="1157" y="305" class="box-sub">agent 1 - security</text>

  <rect x="1140" y="340" width="175" height="82" rx="18" class="review" />
  <text x="1194" y="380" class="box-text">Review</text>
  <text x="1150" y="405" class="box-sub">agent 2 - correctness</text>

  <rect x="1140" y="440" width="175" height="82" rx="18" class="review" />
  <text x="1194" y="480" class="box-text">Review</text>
  <text x="1162" y="505" class="box-sub">agent 3 - simplify</text>

  <ellipse cx="1490" cy="390" rx="72" ry="55" class="done" />
  <text x="1462" y="383" class="box-text">Done</text>
  <text x="1453" y="410" class="box-sub">Open PR</text>

  <path d="M265 281 L385 281 L420 350" class="line orange" marker-end="url(#arrow-orange)" />
  <path d="M265 381 L420 386" class="line orange" marker-end="url(#arrow-orange)" />
  <path d="M265 481 L385 481 L420 425" class="line orange" marker-end="url(#arrow-orange)" />

  <path d="M625 387 L780 387" class="line blue" marker-end="url(#arrow)" />
  <text x="660" y="374" class="label">plan.md</text>

  <path d="M990 386 L1140 281" class="line blue" marker-end="url(#arrow)" />
  <path d="M990 386 L1140 381" class="line blue" marker-end="url(#arrow)" />
  <path d="M990 386 L1140 481" class="line blue" marker-end="url(#arrow)" />
  <text x="1015" y="374" class="label">report.md</text>

  <path d="M1315 281 L1405 281 L1438 365" class="line purple" marker-end="url(#arrow-purple)" />
  <path d="M1315 381 L1418 386" class="line purple" marker-end="url(#arrow-purple)" />
  <path d="M1315 481 L1405 481 L1438 415" class="line purple" marker-end="url(#arrow-purple)" />
</svg>
